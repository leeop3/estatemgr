name: Build Estate Manager APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Gradle 8.4 and set up wrapper
        run: |
          # Download and install Gradle directly
          curl -fsSL https://services.gradle.org/distributions/gradle-8.4-bin.zip \
            -o /tmp/gradle-dist.zip
          unzip -q /tmp/gradle-dist.zip -d /tmp/gradle-dist
          export GRADLE_HOME=/tmp/gradle-dist/gradle-8.4
          export PATH=$GRADLE_HOME/bin:$PATH

          # Copy the real wrapper jar from the full distribution
          cp $GRADLE_HOME/lib/plugins/gradle-wrapper-*.jar \
            gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          cp $(find $GRADLE_HOME -name "gradle-wrapper*.jar" | head -1) \
            gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

          # Write a clean gradlew with no BOM
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME=$(cd "$(dirname "$0")" && pwd -P)
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          if [ -n "$JAVA_HOME" ]; then
            JAVACMD="$JAVA_HOME/bin/java"
          else
            JAVACMD="java"
          fi
          exec "$JAVACMD" -Xmx64m -Xms64m \
            -Dorg.gradle.appname=gradlew \
            -classpath "$CLASSPATH" \
            org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          # Strip any leading whitespace/BOM from gradlew
          sed -i 's/^[[:space:]]*//' gradlew
          chmod +x gradlew
          head -1 gradlew
          echo "gradlew ready"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          export PATH=/tmp/gradle-dist/gradle-8.4/bin:$PATH
          ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: estate-manager-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/reports/
          retention-days: 7
