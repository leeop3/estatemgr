name: Build Estate Manager APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
            -o /tmp/gradle-dist.zip
          unzip -q /tmp/gradle-dist.zip -d /tmp/gradle-dist
          WRAPPER_JAR=$(find /tmp/gradle-dist -name "gradle-wrapper*.jar" 2>/dev/null | head -1)
          cp "$WRAPPER_JAR" gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: Fix gradlew
        run: |
          # Remove the broken DEFAULT_JVM_OPTS line and replace with correct format
          sed -i 's/DEFAULT_JVM_OPTS=.*"-Xmx64m".*/DEFAULT_JVM_OPTS=""/' gradlew
          chmod +x gradlew
          echo "gradlew fixed"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: estate-manager-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/reports/
          retention-days: 7
